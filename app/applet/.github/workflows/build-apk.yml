name: Build SAGE Sentinel APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install NPM Dependencies
      run: npm install

    - name: Build React UI
      run: npm run build

    - name: Initialize Capacitor Android
      run: npx cap add android

    - name: Apply Android Security Hints & Permissions (Automated)
      run: |
        mkdir -p android/app/src/main/res/xml
        cp android-hints/network_security_config.xml android/app/src/main/res/xml/ || echo "No network config found, skipping."
        sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config" android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
        sed -i '/<application/i \
        <uses-permission android:name="android.permission.INTERNET" />\n\
        <uses-permission android:name="android.permission.VIBRATE" />\n\
        <uses-permission android:name="android.permission.HIGH_SAMPLING_RATE_SENSORS" />\n' android/app/src/main/AndroidManifest.xml

    - name: Build Debug APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK for Download
      uses: actions/upload-artifact@v4
      with:
        name: ADHDSage-Sentinel-v4
        path: android/app/build/outputs/apk/debug/app-debug.apk
